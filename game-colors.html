<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Match - 颜色配对游戏</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { font-size: 1.1rem; opacity: 0.9; }
    
    .question {
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .question-text { font-size: 1.5rem; color: #636e72; margin-bottom: 15px; }
    .question-color { 
      font-size: 4rem; 
      padding: 20px 60px;
      border-radius: 16px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .colors-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .color-btn {
      aspect-ratio: 1;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .color-btn:hover { transform: translateY(-5px) scale(1.05); }
    .color-btn:active { transform: scale(0.95); }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: white;
      padding: 15px 30px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .stat-label { font-size: 0.9rem; color: #636e72; }
    .stat-value { font-size: 1.8rem; font-weight: 600; color: #2d3436; }
    
    .controls {
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 15px 40px;
      background: white;
      color: #fa709a;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 5px;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    
    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 6rem;
      animation: feedbackPop 0.5s ease;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes feedbackPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    
    @media (max-width: 600px) {
      .colors-grid { grid-template-columns: repeat(2, 1fr); }
      .question-color { font-size: 3rem; padding: 15px 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌈 Color Match</h1>
      <p>颜色配对 - 点击正确的颜色！</p>
    </div>
    
    <div class="question">
      <div class="question-text">这是什么颜色？<br>What color is this?</div>
      <div class="question-color" id="questionColor">🔴</div>
    </div>
    
    <div class="colors-grid" id="colorsGrid"></div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">得分 Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">连对 Streak</div>
        <div class="stat-value" id="streak">0</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="btn" onclick="initGame()">🔄 新题目</button>
      <a href="index.html" class="btn">🏠 返回首页</a>
    </div>
  </div>

  <script>
    const colors = [
      { name: 'red', cn: '红色', emoji: '🔴', bg: '#ff6b6b' },
      { name: 'blue', cn: '蓝色', emoji: '🔵', bg: '#4ecdc4' },
      { name: 'green', cn: '绿色', emoji: '🟢', bg: '#1dd1a1' },
      { name: 'yellow', cn: '黄色', emoji: '🟡', bg: #ffe66d },
      { name: 'orange', cn: '橙色', emoji: '🟠', bg: '#ff9f43' },
      { name: 'purple', cn: '紫色', emoji: '🟣', bg: '#a29bfe' },
      { name: 'black', cn: '黑色', emoji: '⚫', bg: '#2d3436' },
      { name: 'white', cn: '白色', emoji: '⚪', bg: '#dfe6e9', text: '#2d3436' }
    ];
    
    let score = 0;
    let streak = 0;
    let currentColor = null;

    function initGame() {
      // Pick random color for question
      currentColor = colors[Math.floor(Math.random() * colors.length)];
      document.getElementById('questionColor').textContent = currentColor.emoji;
      
      // Create color buttons (random order)
      const grid = document.getElementById('colorsGrid');
      grid.innerHTML = '';
      
      const shuffled = [...colors].sort(() => Math.random() - 0.5);
      shuffled.forEach(color => {
        const btn = document.createElement('button');
        btn.className = 'color-btn';
        btn.style.background = color.bg;
        btn.style.color = color.text || 'white';
        btn.textContent = color.cn;
        btn.onclick = () => checkAnswer(color);
        grid.appendChild(btn);
      });
    }

    function checkAnswer(selectedColor) {
      const isCorrect = selectedColor.name === currentColor.name;
      
      // Show feedback
      const feedback = document.createElement('div');
      feedback.className = 'feedback';
      feedback.textContent = isCorrect ? '✅' : '❌';
      document.body.appendChild(feedback);
      
      setTimeout(() => feedback.remove(), 500);
      
      if (isCorrect) {
        score += 10 + streak;
        streak++;
        speak(`Correct! ${currentColor.cn}`);
        setTimeout(initGame, 800);
      } else {
        streak = 0;
        score = Math.max(0, score - 5);
        speak(`Try again! It's ${currentColor.cn}`);
      }
      
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
      }
    }

    // Start game
    initGame();
  </script>
</body>
</html>
