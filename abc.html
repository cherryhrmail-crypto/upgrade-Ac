<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A B C 字母王国 | 小星星英语</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#ffecd2 0%,#fcb69f 30%,#a18cd1 70%,#fbc2eb 100%);min-height:100vh;overflow-x:hidden;}

.back-btn{position:fixed;left:18px;top:18px;z-index:100;background:white;border:none;border-radius:30px;padding:9px 20px;font-family:'Nunito',sans-serif;font-weight:900;color:#a18cd1;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.15);text-decoration:none;transition:transform .2s;}
.back-btn:hover{transform:scale(1.07);}

header{text-align:center;padding:70px 20px 16px;position:relative;z-index:10;}
.page-title{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,8vw,4rem);background:linear-gradient(90deg,#ff6b9d,#a18cd1,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{color:rgba(80,40,80,.7);font-size:1rem;margin-top:4px;}

/* Mode tabs */
.mode-tabs{display:flex;justify-content:center;gap:12px;margin:14px auto 20px;flex-wrap:wrap;position:relative;z-index:10;padding:0 16px;}
.tab-btn{background:rgba(255,255,255,.55);border:2.5px solid rgba(255,255,255,.8);color:#7b4f8a;font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;padding:9px 22px;border-radius:30px;cursor:pointer;transition:all .22s;backdrop-filter:blur(4px);}
.tab-btn.active,.tab-btn:hover{background:white;color:#a18cd1;transform:scale(1.06);box-shadow:0 4px 16px rgba(161,140,209,.35);}

/* Learn */
#section-learn{display:block;}
#section-trace{display:none;}
#section-quiz{display:none;}

.section{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:0 16px 80px;}

/* ABC Grid */
.abc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;}
.abc-card{background:white;border-radius:20px;padding:14px 8px 12px;text-align:center;cursor:pointer;transition:transform .22s,box-shadow .22s;box-shadow:0 4px 14px rgba(0,0,0,.1);border:3px solid transparent;user-select:none;}
.abc-card:hover,.abc-card.lit{transform:translateY(-7px) scale(1.05);box-shadow:0 12px 30px rgba(161,140,209,.4);}
.abc-upper{font-family:'Fredoka One',cursive;font-size:2.4rem;line-height:1;display:block;}
.abc-lower{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#aaa;display:block;margin:1px 0 6px;}
.abc-emoji{font-size:1.8rem;display:block;}
.abc-word{font-size:.72rem;color:#888;font-weight:700;margin-top:3px;}

/* Detail panel */
.detail-panel{background:white;border-radius:28px;padding:26px 28px;margin-bottom:22px;box-shadow:0 8px 30px rgba(161,140,209,.25);display:flex;align-items:center;gap:24px;flex-wrap:wrap;min-height:110px;transition:all .3s;}
.detail-letter{font-family:'Fredoka One',cursive;font-size:6rem;line-height:1;transition:color .3s;}
.detail-info .detail-word{font-family:'Fredoka One',cursive;font-size:2rem;}
.detail-info .detail-cn{color:#aaa;font-size:.95rem;margin-top:2px;}
.detail-info .detail-say-btn{margin-top:10px;background:linear-gradient(90deg,#ff6b9d,#a18cd1);border:none;border-radius:30px;padding:9px 24px;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:transform .2s;}
.detail-info .detail-say-btn:hover{transform:scale(1.08);}
.detail-emoji-big{font-size:5rem;margin-left:auto;}

/* Trace */
.trace-wrap{background:white;border-radius:28px;padding:30px;text-align:center;box-shadow:0 8px 30px rgba(161,140,209,.2);}
.trace-letter-nav{display:flex;justify-content:center;align-items:center;gap:18px;margin-bottom:20px;}
.nav-btn{background:rgba(161,140,209,.15);border:none;border-radius:50%;width:44px;height:44px;font-size:1.4rem;cursor:pointer;transition:background .2s;}
.nav-btn:hover{background:rgba(161,140,209,.4);}
.trace-canvas-wrap{position:relative;display:inline-block;}
canvas#traceCanvas{border:3px dashed #ddd;border-radius:20px;cursor:crosshair;touch-action:none;background:#fafafa;}
.trace-hint{font-size:4.5rem;font-family:'Fredoka One',cursive;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(161,140,209,.18);pointer-events:none;user-select:none;}
.trace-controls{margin-top:16px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
.trace-btn{background:linear-gradient(90deg,#a18cd1,#fbc2eb);border:none;border-radius:24px;padding:10px 26px;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:transform .2s;}
.trace-btn:hover{transform:scale(1.06);}
.trace-btn.clear{background:linear-gradient(90deg,#ffecd2,#fcb69f);}

/* Quiz */
.quiz-card{background:white;border-radius:28px;padding:30px;text-align:center;box-shadow:0 8px 30px rgba(161,140,209,.2);}
.quiz-q{font-size:1.1rem;color:#888;margin-bottom:8px;}
.quiz-show{font-family:'Fredoka One',cursive;font-size:clamp(3rem,14vw,7rem);margin:10px 0 20px;animation:bigPulse 2s ease-in-out infinite;}
@keyframes bigPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:380px;margin:0 auto;}
.q-opt{background:rgba(161,140,209,.1);border:3px solid rgba(161,140,209,.3);border-radius:20px;padding:14px;font-family:'Fredoka One',cursive;font-size:1.6rem;cursor:pointer;transition:all .22s;}
.q-opt:hover{background:rgba(161,140,209,.25);transform:scale(1.06);}
.q-opt.correct{background:#2ECC71;border-color:#2ECC71;color:white;animation:pop .5s ease;}
.q-opt.wrong{background:#E74C3C;border-color:#E74C3C;color:white;animation:shk .4s ease;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
@keyframes shk{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}

/* Score */
.score-bar{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin:0 auto 14px;position:relative;z-index:10;}
.score-pill{background:rgba(255,255,255,.6);border-radius:20px;padding:7px 18px;font-weight:900;font-size:.95rem;color:#7b4f8a;backdrop-filter:blur(4px);}

/* Feedback toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:white;border-radius:20px;padding:14px 30px;font-weight:900;font-size:1.1rem;color:#333;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:9999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.good{border-left:6px solid #2ECC71;}
.toast.bad{border-left:6px solid #E74C3C;}

@media(max-width:480px){.abc-grid{grid-template-columns:repeat(4,1fr);gap:8px;}.abc-upper{font-size:1.8rem;}.detail-letter{font-size:4rem;}}
</style>
</head>
<body>

<a class="back-btn" href="index.html">← 返回</a>

<header>
  <div class="page-title">🔤 A B C Letters</div>
  <div class="page-sub">字母王国 · 认识26个字母朋友！</div>
</header>

<div class="score-bar">
  <div class="score-pill">⭐ 积分: <span id="scoreNum">0</span></div>
  <div class="score-pill" id="starPill">☆☆☆☆☆</div>
</div>

<div class="mode-tabs">
  <button class="tab-btn active" onclick="switchMode('learn')">📖 认识字母</button>
  <button class="tab-btn" onclick="switchMode('trace')">✏️ 描写练习</button>
  <button class="tab-btn" onclick="switchMode('quiz')">🎯 猜字母</button>
</div>

<!-- LEARN -->
<div class="section" id="section-learn">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-letter" id="detailLetter" style="color:#a18cd1">A</div>
    <div class="detail-info">
      <div class="detail-word" id="detailWord">Apple 🍎</div>
      <div class="detail-cn" id="detailCn">苹果 · 点击字母卡听发音</div>
      <button class="detail-say-btn" id="detailSayBtn" onclick="speakCurrent()">🔊 Listen!</button>
    </div>
    <div class="detail-emoji-big" id="detailEmojiBig">🍎</div>
  </div>
  <div class="abc-grid" id="abcGrid"></div>
</div>

<!-- TRACE -->
<div class="section" id="section-trace">
  <div class="trace-wrap">
    <div class="trace-letter-nav">
      <button class="nav-btn" onclick="traceNav(-1)">◀</button>
      <span style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#a18cd1" id="traceNavLabel">A — Apple</span>
      <button class="nav-btn" onclick="traceNav(1)">▶</button>
    </div>
    <div class="trace-canvas-wrap">
      <canvas id="traceCanvas" width="300" height="260"></canvas>
      <div class="trace-hint" id="traceHint">A</div>
    </div>
    <div class="trace-controls">
      <button class="trace-btn clear" onclick="clearCanvas()">🗑 Clear</button>
      <button class="trace-btn" onclick="speakTraceLetter()">🔊 Listen</button>
    </div>
    <p style="margin-top:14px;color:#bbb;font-size:.85rem;">用手指或鼠标在画布上描写字母！</p>
  </div>
</div>

<!-- QUIZ -->
<div class="section" id="section-quiz">
  <div class="quiz-card">
    <div class="quiz-q" id="quizQ">这个字母开头的单词是哪个？</div>
    <div class="quiz-show" id="quizShow">A</div>
    <div class="quiz-opts" id="quizOpts"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LETTERS = [
  {l:'A',w:'Apple',cn:'苹果',e:'🍎',c:'#FF6B9D'},
  {l:'B',w:'Ball',cn:'球',e:'⚽',c:'#FF8C42'},
  {l:'C',w:'Cat',cn:'猫',e:'🐱',c:'#FFD700'},
  {l:'D',w:'Dog',cn:'狗',e:'🐶',c:'#2EC4B6'},
  {l:'E',w:'Egg',cn:'蛋',e:'🥚',c:'#3498DB'},
  {l:'F',w:'Fish',cn:'鱼',e:'🐟',c:'#9B59B6'},
  {l:'G',w:'Grape',cn:'葡萄',e:'🍇',c:'#E74C3C'},
  {l:'H',w:'Hat',cn:'帽子',e:'🎩',c:'#FF6B9D'},
  {l:'I',w:'Ice cream',cn:'冰激凌',e:'🍦',c:'#FF8C42'},
  {l:'J',w:'Juice',cn:'果汁',e:'🧃',c:'#FFD700'},
  {l:'K',w:'Kite',cn:'风筝',e:'🪁',c:'#2EC4B6'},
  {l:'L',w:'Lion',cn:'狮子',e:'🦁',c:'#3498DB'},
  {l:'M',w:'Moon',cn:'月亮',e:'🌙',c:'#9B59B6'},
  {l:'N',w:'Nest',cn:'鸟巢',e:'🪹',c:'#E74C3C'},
  {l:'O',w:'Orange',cn:'橙子',e:'🍊',c:'#FF6B9D'},
  {l:'P',w:'Pig',cn:'猪',e:'🐷',c:'#FF8C42'},
  {l:'Q',w:'Queen',cn:'女王',e:'👸',c:'#FFD700'},
  {l:'R',w:'Rainbow',cn:'彩虹',e:'🌈',c:'#2EC4B6'},
  {l:'S',w:'Star',cn:'星星',e:'⭐',c:'#3498DB'},
  {l:'T',w:'Tiger',cn:'老虎',e:'🐯',c:'#9B59B6'},
  {l:'U',w:'Umbrella',cn:'雨伞',e:'☂️',c:'#E74C3C'},
  {l:'V',w:'Violin',cn:'小提琴',e:'🎻',c:'#FF6B9D'},
  {l:'W',w:'Whale',cn:'鲸鱼',e:'🐳',c:'#FF8C42'},
  {l:'X',w:'Xylophone',cn:'木琴',e:'🎵',c:'#FFD700'},
  {l:'Y',w:'Yo-yo',cn:'溜溜球',e:'🪀',c:'#2EC4B6'},
  {l:'Z',w:'Zebra',cn:'斑马',e:'🦓',c:'#3498DB'},
];

let score=0, currentIdx=0, traceIdx=0, quizCorrect=0;
let isDrawing=false, lastX=0, lastY=0;

function speak(text,rate=0.72,pitch=1.3){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=pitch;
  window.speechSynthesis.speak(u);
}
function addScore(n){
  score+=n;
  document.getElementById('scoreNum').textContent=score;
  const s=Math.min(5,Math.floor(score/12));
  document.getElementById('starPill').textContent='★'.repeat(s)+'☆'.repeat(5-s);
}

// ---- MODE ----
function switchMode(m){
  ['learn','trace','quiz'].forEach(id=>{
    document.getElementById('section-'+id).style.display=m===id?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['learn','trace','quiz'][i]===m);
  });
  if(m==='trace')initCanvas();
  if(m==='quiz')setupQuiz();
}

// ---- LEARN ----
function buildGrid(){
  const g=document.getElementById('abcGrid');
  LETTERS.forEach((item,i)=>{
    const c=document.createElement('div');
    c.className='abc-card';
    c.style.borderColor=item.c+'66';
    c.innerHTML=`<span class="abc-upper" style="color:${item.c}">${item.l}</span><span class="abc-lower">${item.l.toLowerCase()}</span><span class="abc-emoji">${item.e}</span><div class="abc-word">${item.w}</div>`;
    c.onclick=()=>{
      document.querySelectorAll('.abc-card').forEach(x=>x.classList.remove('lit'));
      c.classList.add('lit');
      currentIdx=i;
      updateDetail(item);
      speak(`${item.l}. ${item.w}`,0.65,1.35);
    };
    g.appendChild(c);
  });
}
function updateDetail(item){
  document.getElementById('detailLetter').textContent=item.l;
  document.getElementById('detailLetter').style.color=item.c;
  document.getElementById('detailWord').textContent=item.w+' '+item.e;
  document.getElementById('detailCn').textContent=item.cn;
  document.getElementById('detailEmojiBig').textContent=item.e;
}
function speakCurrent(){
  const item=LETTERS[currentIdx];
  speak(`${item.l}. ${item.w}. ${item.l.toLowerCase()}.`,0.65,1.3);
}

// ---- TRACE (canvas drawing) ----
function initCanvas(){
  updateTraceHint();
  const canvas=document.getElementById('traceCanvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Mouse
  canvas.onmousedown=e=>{isDrawing=true;[lastX,lastY]=getPos(e,canvas);};
  canvas.onmousemove=e=>{if(!isDrawing)return;draw(ctx,...getPos(e,canvas));};
  canvas.onmouseup=canvas.onmouseleave=()=>isDrawing=false;
  // Touch
  canvas.ontouchstart=e=>{e.preventDefault();isDrawing=true;[lastX,lastY]=getPos(e.touches[0],canvas);};
  canvas.ontouchmove=e=>{e.preventDefault();if(!isDrawing)return;draw(ctx,...getPos(e.touches[0],canvas));};
  canvas.ontouchend=()=>isDrawing=false;
}
function getPos(e,canvas){
  const r=canvas.getBoundingClientRect();
  return[e.clientX-r.left,e.clientY-r.top];
}
function draw(ctx,x,y){
  ctx.beginPath();
  ctx.moveTo(lastX,lastY);
  ctx.lineTo(x,y);
  ctx.strokeStyle=LETTERS[traceIdx].c;
  ctx.lineWidth=7;
  ctx.lineCap='round';
  ctx.stroke();
  [lastX,lastY]=[x,y];
}
function clearCanvas(){
  const canvas=document.getElementById('traceCanvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}
function traceNav(d){
  traceIdx=(traceIdx+d+26)%26;
  clearCanvas();
  updateTraceHint();
  speak(LETTERS[traceIdx].l,0.6,1.3);
}
function updateTraceHint(){
  const item=LETTERS[traceIdx];
  document.getElementById('traceHint').textContent=item.l;
  document.getElementById('traceHint').style.color='rgba('+hexToRgb(item.c)+',.15)';
  document.getElementById('traceNavLabel').textContent=`${item.l} — ${item.w}`;
}
function speakTraceLetter(){
  const item=LETTERS[traceIdx];
  speak(`${item.l}. ${item.w}`,0.65,1.3);
}
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ---- QUIZ ----
let quizItem=null;
let quizByWord=false;
function setupQuiz(){
  quizItem=LETTERS[Math.floor(Math.random()*26)];
  quizByWord=Math.random()>.5;
  document.getElementById('quizQ').textContent=quizByWord?'这个单词以哪个字母开头？':'这个字母对应哪个单词？';
  const show=document.getElementById('quizShow');
  show.textContent=quizByWord?quizItem.w+' '+quizItem.e:quizItem.l;
  show.style.color=quizItem.c;
  speak(quizByWord?quizItem.w:quizItem.l,0.68,1.3);

  const opts=new Set([LETTERS.indexOf(quizItem)]);
  while(opts.size<4)opts.add(Math.floor(Math.random()*26));
  const div=document.getElementById('quizOpts');
  div.innerHTML='';
  [...opts].sort(()=>Math.random()-.5).forEach(i=>{
    const item=LETTERS[i];
    const btn=document.createElement('button');
    btn.className='q-opt';
    btn.style.color=item.c;
    btn.textContent=quizByWord?item.l:item.w;
    btn.onclick=()=>checkQuiz(i,btn);
    div.appendChild(btn);
  });
}
function checkQuiz(i,btn){
  document.querySelectorAll('.q-opt').forEach(b=>b.onclick=null);
  const correct=LETTERS.indexOf(quizItem);
  if(i===correct){
    btn.classList.add('correct');
    speak(`Yes! ${quizItem.l} for ${quizItem.w}!`,0.7,1.4);
    addScore(10);
    showToast('🎉 Excellent! 棒棒哒！',true);
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.q-opt').forEach((b,idx)=>{
      const allOpts=[...document.querySelectorAll('.q-opt')];
      // highlight correct
    });
    // find correct btn
    document.querySelectorAll('.q-opt').forEach(b=>{
      if((quizByWord&&b.textContent===quizItem.l)||(!quizByWord&&b.textContent===quizItem.w))
        b.classList.add('correct');
    });
    speak(`Oops! ${quizItem.l} for ${quizItem.w}!`,0.7,1.3);
    showToast(`💡 正确答案: ${quizByWord?quizItem.l:quizItem.w}`,false);
  }
  setTimeout(setupQuiz,2000);
}

function showToast(msg,good){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(good?'good':'bad')+' show';
  setTimeout(()=>t.classList.remove('show'),1800);
}

buildGrid();
updateDetail(LETTERS[0]);
</script>
</body>
</html>
