<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Bee - 拼写游戏</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { font-size: 1.1rem; opacity: 0.9; }
    
    .word-display {
      background: white;
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .word-emoji { font-size: 5rem; margin-bottom: 20px; }
    .word-hint { font-size: 1.2rem; color: #636e72; margin-bottom: 15px; }
    
    .letter-slots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .letter-slot {
      width: 60px;
      height: 70px;
      border: 3px solid #dfe6e9;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 600;
      color: #2d3436;
      background: #f8f9fa;
      transition: all 0.3s;
    }
    .letter-slot.filled {
      border-color: #74b9ff;
      background: #e8f4f8;
    }
    .letter-slot.correct {
      border-color: #00b894;
      background: #e8f8f5;
      color: #00b894;
    }
    
    .keyboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .key {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 12px;
      background: white;
      font-size: 1.3rem;
      font-weight: 600;
      color: #2d3436;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .key:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
    .key:active { transform: translateY(0); }
    .key.used { opacity: 0.3; cursor: not-allowed; }
    
    .controls-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .control-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      background: rgba(255,255,255,0.9);
      color: #f5576c;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .control-btn:hover { transform: translateY(-2px); }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: white;
      padding: 15px 30px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .stat-label { font-size: 0.9rem; color: #636e72; }
    .stat-value { font-size: 1.8rem; font-weight: 600; color: #2d3436; }
    
    .main-controls {
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 15px 40px;
      background: white;
      color: #f5576c;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 5px;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    
    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 6rem;
      animation: feedbackPop 0.5s ease;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes feedbackPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    
    @media (max-width: 600px) {
      .letter-slot { width: 45px; height: 55px; font-size: 1.5rem; }
      .key { width: 40px; height: 40px; font-size: 1.1rem; }
      .word-emoji { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐝 Spelling Bee</h1>
      <p>拼写游戏 - 拼出正确的单词！</p>
    </div>
    
    <div class="word-display">
      <div class="word-emoji" id="wordEmoji">🐱</div>
      <div class="word-hint" id="wordHint">猫</div>
      <div class="letter-slots" id="letterSlots"></div>
    </div>
    
    <div class="keyboard" id="keyboard"></div>
    
    <div class="controls-row">
      <button class="control-btn" onclick="speakWord()">🔊 听发音</button>
      <button class="control-btn" onclick="clearSlots()">↩️ 清除</button>
      <button class="control-btn" onclick="showHint()">💡 提示</button>
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">得分 Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">单词 Words</div>
        <div class="stat-value" id="words">0</div>
      </div>
    </div>
    
    <div class="main-controls">
      <button class="btn" onclick="nextWord()">🔄 下一个</button>
      <a href="index.html" class="btn">🏠 返回首页</a>
    </div>
  </div>

  <script>
    const words = [
      { emoji: '🐱', word: 'cat', cn: '猫' },
      { emoji: '🐶', word: 'dog', cn: '狗' },
      { emoji: '🐦', word: 'bird', cn: '鸟' },
      { emoji: '🐟', word: 'fish', cn: '鱼' },
      { emoji: '🐰', word: 'rabbit', cn: '兔子' },
      { emoji: '🐻', word: 'bear', cn: '熊' },
      { emoji: '🍎', word: 'apple', cn: '苹果' },
      { emoji: '🍌', word: 'banana', cn: '香蕉' },
      { emoji: '🔴', word: 'red', cn: '红色' },
      { emoji: '🔵', word: 'blue', cn: '蓝色' },
      { emoji: '📖', word: 'book', cn: '书' },
      { emoji: '✏️', word: 'pen', cn: '笔' }
    ];
    
    const alphabet = 'abcdefghijklmnopqrstuvwxyz';
    let currentWord = null;
    let currentSlots = [];
    let score = 0;
    let wordsCompleted = 0;

    function initGame() {
      createKeyboard();
      nextWord();
    }

    function createKeyboard() {
      const keyboard = document.getElementById('keyboard');
      keyboard.innerHTML = '';
      
      for (let letter of alphabet) {
        const key = document.createElement('button');
        key.className = 'key';
        key.textContent = letter.toUpperCase();
        key.onclick = () => addLetter(letter);
        keyboard.appendChild(key);
      }
    }

    function nextWord() {
      currentWord = words[Math.floor(Math.random() * words.length)];
      currentSlots = new Array(currentWord.word.length).fill('');
      
      document.getElementById('wordEmoji').textContent = currentWord.emoji;
      document.getElementById('wordHint').textContent = currentWord.cn;
      
      createSlots();
      resetKeyboard();
      speak(`Spell the word: ${currentWord.word}`);
    }

    function createSlots() {
      const slotsContainer = document.getElementById('letterSlots');
      slotsContainer.innerHTML = '';
      
      currentSlots.forEach((letter, index) => {
        const slot = document.createElement('div');
        slot.className = 'letter-slot' + (letter ? ' filled' : '');
        slot.textContent = letter.toUpperCase();
        slot.onclick = () => removeLetter(index);
        slotsContainer.appendChild(slot);
      });
    }

    function addLetter(letter) {
      const emptyIndex = currentSlots.indexOf('');
      if (emptyIndex === -1) return;
      
      currentSlots[emptyIndex] = letter;
      createSlots();
      
      // Mark key as used
      const keys = document.querySelectorAll('.key');
      keys.forEach(key => {
        if (key.textContent.toLowerCase() === letter) {
          key.classList.add('used');
        }
      });
      
      // Check if word is complete
      if (!currentSlots.includes('')) {
        checkWord();
      }
    }

    function removeLetter(index) {
      if (!currentSlots[index]) return;
      
      const letter = currentSlots[index];
      currentSlots[index] = '';
      createSlots();
      
      // Unmark key
      const keys = document.querySelectorAll('.key');
      keys.forEach(key => {
        if (key.textContent.toLowerCase() === letter) {
          key.classList.remove('used');
        }
      });
    }

    function clearSlots() {
      currentSlots = new Array(currentWord.word.length).fill('');
      createSlots();
      resetKeyboard();
    }

    function resetKeyboard() {
      document.querySelectorAll('.key').forEach(key => key.classList.remove('used'));
    }

    function checkWord() {
      const spelled = currentSlots.join('').toLowerCase();
      const isCorrect = spelled === currentWord.word;
      
      // Show feedback
      const feedback = document.createElement('div');
      feedback.className = 'feedback';
      feedback.textContent = isCorrect ? '✅' : '❌';
      document.body.appendChild(feedback);
      setTimeout(() => feedback.remove(), 500);
      
      // Mark slots as correct/incorrect
      const slots = document.querySelectorAll('.letter-slot');
      slots.forEach((slot, index) => {
        if (currentSlots[index].toLowerCase() === currentWord.word[index]) {
          slot.classList.add('correct');
        }
      });
      
      if (isCorrect) {
        score += 20;
        wordsCompleted++;
        speak(`Excellent! ${currentWord.word}`);
        document.getElementById('score').textContent = score;
        document.getElementById('words').textContent = wordsCompleted;
        setTimeout(nextWord, 1500);
      } else {
        speak(`Try again!`);
      }
    }

    function speakWord() {
      speak(currentWord.word);
    }

    function showHint() {
      // Reveal first letter
      const emptyIndex = currentSlots.indexOf('');
      if (emptyIndex !== -1) {
        currentSlots[emptyIndex] = currentWord.word[emptyIndex];
        createSlots();
        score = Math.max(0, score - 5);
        document.getElementById('score').textContent = score;
      }
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
      }
    }

    // Start game
    initGame();
  </script>
</body>
</html>
