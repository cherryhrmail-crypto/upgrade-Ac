<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Says - 西蒙说游戏</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { font-size: 1.1rem; opacity: 0.9; }
    
    .status {
      text-align: center;
      color: white;
      font-size: 1.3rem;
      margin-bottom: 20px;
      min-height: 40px;
    }
    .status .command { 
      background: rgba(255,255,255,0.2); 
      padding: 10px 30px; 
      border-radius: 30px;
      display: inline-block;
    }
    
    .game-pad {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .pad {
      aspect-ratio: 1;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      border: 5px solid rgba(255,255,255,0.3);
    }
    .pad:active, .pad.active {
      transform: scale(0.95);
      filter: brightness(1.3);
      box-shadow: 0 0 40px rgba(255,255,255,0.5);
    }
    
    .pad-red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
    .pad-blue { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
    .pad-yellow { background: linear-gradient(135deg, #ffe66d, #f7d794); }
    .pad-green { background: linear-gradient(135deg, #1dd1a1, #10ac84); }
    
    .score-board {
      text-align: center;
      color: white;
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    .score { font-size: 3rem; font-weight: 600; }
    
    .controls {
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 15px 40px;
      background: white;
      color: #11998e;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 5px;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .game-over {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 40px 60px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: none;
      z-index: 100;
    }
    .game-over.show { display: block; animation: popIn 0.5s ease; }
    .game-over h2 { color: #ff6b6b; font-size: 2.5rem; margin-bottom: 15px; }
    .game-over p { color: #636e72; font-size: 1.2rem; margin-bottom: 20px; }
    
    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 99;
    }
    .overlay.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 Simon Says</h1>
      <p>西蒙说 - 记住并重复序列！</p>
    </div>
    
    <div class="status" id="status">
      <span class="command">点击"开始游戏"</span>
    </div>
    
    <div class="game-pad">
      <div class="pad pad-red" data-color="red" onclick="handlePadClick('red')">🔴</div>
      <div class="pad pad-blue" data-color="blue" onclick="handlePadClick('blue')">🔵</div>
      <div class="pad pad-yellow" data-color="yellow" onclick="handlePadClick('yellow')">🟡</div>
      <div class="pad pad-green" data-color="green" onclick="handlePadClick('green')">🟢</div>
    </div>
    
    <div class="score-board">
      <div>得分</div>
      <div class="score" id="score">0</div>
    </div>
    
    <div class="controls">
      <button class="btn" id="startBtn" onclick="startGame()">▶️ 开始游戏</button>
      <a href="index.html" class="btn">🏠 返回首页</a>
    </div>
  </div>
  
  <div class="overlay" id="overlay"></div>
  <div class="game-over" id="gameOver">
    <h2>😢 游戏结束</h2>
    <p>你的得分: <span id="finalScore">0</span></p>
    <button class="btn" onclick="resetGame()">再试一次</button>
  </div>

  <script>
    const colors = ['red', 'blue', 'yellow', 'green'];
    const colorNames = { red: '红色', blue: '蓝色', yellow: '黄色', green: '绿色' };
    let sequence = [];
    let playerSequence = [];
    let score = 0;
    let isPlaying = false;
    let isPlayerTurn = false;

    function startGame() {
      sequence = [];
      playerSequence = [];
      score = 0;
      isPlaying = true;
      document.getElementById('score').textContent = score;
      document.getElementById('startBtn').disabled = true;
      document.getElementById('startBtn').textContent = '游戏进行中...';
      
      setTimeout(() => {
        nextRound();
      }, 1000);
    }

    function nextRound() {
      playerSequence = [];
      isPlayerTurn = false;
      
      // Add new color to sequence
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      sequence.push(randomColor);
      
      document.getElementById('status').innerHTML = 
        `<span class="command">👀 仔细看...</span>`;
      
      // Play sequence
      playSequence();
    }

    function playSequence() {
      let i = 0;
      const interval = setInterval(() => {
        if (i >= sequence.length) {
          clearInterval(interval);
          isPlayerTurn = true;
          document.getElementById('status').innerHTML = 
            `<span class="command">🎮 轮到你了！</span>`;
          return;
        }
        
        flashPad(sequence[i]);
        i++;
      }, 800);
    }

    function flashPad(color) {
      const pad = document.querySelector(`[data-color="${color}"]`);
      pad.classList.add('active');
      
      // Play sound effect (simulated with speech)
      speak(colorNames[color]);
      
      setTimeout(() => {
        pad.classList.remove('active');
      }, 400);
    }

    function handlePadClick(color) {
      if (!isPlaying || !isPlayerTurn) return;
      
      flashPad(color);
      playerSequence.push(color);
      
      // Check if correct
      const currentIndex = playerSequence.length - 1;
      if (playerSequence[currentIndex] !== sequence[currentIndex]) {
        gameOver();
        return;
      }
      
      // Check if round complete
      if (playerSequence.length === sequence.length) {
        score++;
        document.getElementById('score').textContent = score;
        isPlayerTurn = false;
        document.getElementById('status').innerHTML = 
          `<span class="command">✅ 正确！下一关...</span>`;
        
        setTimeout(() => {
          nextRound();
        }, 1500);
      }
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.2;
        speechSynthesis.speak(utterance);
      }
    }

    function gameOver() {
      isPlaying = false;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').classList.add('show');
      document.getElementById('overlay').classList.add('show');
      document.getElementById('status').innerHTML = 
        `<span class="command">❌ 错了！</span>`;
    }

    function resetGame() {
      document.getElementById('gameOver').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = '▶️ 开始游戏';
      document.getElementById('status').innerHTML = 
        `<span class="command">点击"开始游戏"</span>`;
    }
  </script>
</body>
</html>
