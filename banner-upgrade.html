<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>优格德幼儿英语 - 广告牌</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8edf2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .page-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }

  /* ── 广告牌容器 3.5:1 ── */
  .banner-wrap {
    width: 100%;
    max-width: 1120px;
    aspect-ratio: 3.5 / 1;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.22);
    position: relative;
  }

  /* ── 广告牌主体 ── */
  .banner {
    width: 100%;
    height: 100%;
    position: relative;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 深蓝渐变背景 */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, #003a8c 0%, #0057d1 45%, #1a7fd4 75%, #0e5eb8 100%);
    z-index: 0;
  }

  /* 右侧光晕 */
  .bg-glow {
    position: absolute;
    right: -5%;
    top: -20%;
    width: 55%;
    aspect-ratio: 1;
    background: radial-gradient(circle, rgba(100,180,255,0.22) 0%, transparent 70%);
    z-index: 1;
  }

  /* 左侧光晕 */
  .bg-glow2 {
    position: absolute;
    left: -8%;
    bottom: -30%;
    width: 40%;
    aspect-ratio: 1;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    z-index: 1;
  }

  /* 横向波纹装饰线 */
  .wave-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
  }
  .wave-lines svg {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 40%;
    opacity: 0.07;
  }

  /* 左侧彩色竖条 */
  .side-bar-left {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3.5%;
    background: linear-gradient(180deg,
      #FFD700 0%,
      #FF6B35 25%,
      #FF4081 50%,
      #AB47BC 75%,
      #42A5F5 100%
    );
    z-index: 3;
  }

  /* 右侧彩色竖条 */
  .side-bar-right {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3.5%;
    background: linear-gradient(180deg,
      #42A5F5 0%,
      #AB47BC 25%,
      #FF4081 50%,
      #FF6B35 75%,
      #FFD700 100%
    );
    z-index: 3;
  }

  /* 顶部细线 */
  .top-line {
    position: absolute;
    top: 0; left: 3.5%; right: 3.5%;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    z-index: 3;
  }

  /* 底部细线 */
  .bottom-line {
    position: absolute;
    bottom: 0; left: 3.5%; right: 3.5%;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    z-index: 3;
  }

  /* ── 核心内容 ── */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    text-align: center;
    padding: 0 6%;
    width: 100%;
  }

  /* 主标题 */
  .main-title {
    font-size: clamp(28px, 6.8vw, 96px);
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0.12em;
    line-height: 1.0;
    text-shadow:
      0 2px 8px rgba(0,0,0,0.3),
      0 0 40px rgba(100,200,255,0.4);
    white-space: nowrap;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif;
  }

  /* 分隔装饰 */
  .separator {
    display: flex;
    align-items: center;
    gap: clamp(6px, 1.5vw, 20px);
    margin: clamp(6px, 1.2vw, 18px) 0;
  }
  .sep-line {
    width: clamp(40px, 8vw, 120px);
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7));
    border-radius: 2px;
  }
  .sep-line.rev {
    background: linear-gradient(90deg, rgba(255,255,255,0.7), transparent);
  }
  .sep-dot {
    width: clamp(6px, 1vw, 12px);
    aspect-ratio: 1;
    border-radius: 50%;
    background: #FFD700;
    box-shadow: 0 0 8px rgba(255,215,0,0.8);
  }
  .sep-star {
    font-size: clamp(10px, 1.8vw, 24px);
    color: #FFD700;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
  }

  /* 副标语 */
  .sub-slogan {
    font-size: clamp(13px, 2.8vw, 42px);
    font-weight: 700;
    color: rgba(255, 255, 255, 0.92);
    letter-spacing: 0.2em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.25);
    white-space: nowrap;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif;
  }

  /* 注释 */
  .note {
    margin-top: 16px;
    font-size: 13px;
    color: #aaa;
  }

  @media print {
    body { background: white; padding: 0; }
    .note { display: none; }
    .banner-wrap { max-width: 100%; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="page-label">广告牌预览 &nbsp;·&nbsp; 3.5m × 1m</div>

<div class="banner-wrap">
  <div class="banner">

    <!-- 背景层 -->
    <div class="bg-gradient"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow2"></div>

    <!-- 波纹装饰 -->
    <div class="wave-lines">
      <svg viewBox="0 0 1400 200" preserveAspectRatio="none">
        <path d="M0,80 Q175,20 350,80 Q525,140 700,80 Q875,20 1050,80 Q1225,140 1400,80 L1400,200 L0,200 Z" fill="white"/>
      </svg>
    </div>

    <!-- 侧边彩条 -->
    <div class="side-bar-left"></div>
    <div class="side-bar-right"></div>
    <div class="top-line"></div>
    <div class="bottom-line"></div>

    <!-- 核心文字 -->
    <div class="content">
      <div class="main-title">优格德幼儿英语</div>

      <div class="separator">
        <div class="sep-line"></div>
        <div class="sep-dot"></div>
        <span class="sep-star">✦</span>
        <div class="sep-dot"></div>
        <div class="sep-line rev"></div>
      </div>

      <div class="sub-slogan">让每一个孩子爱上英语</div>
    </div>

  </div>
</div>

<div class="note">📐 实际尺寸 3.5m × 1m &nbsp;|&nbsp; 适合写真喷绘 / 灯箱布 / KT板输出</div>

</body>
</html>
