<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Sounds - 动物声音猜猜猜</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    .header {
      text-align: center;
      color: #2d3436;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { font-size: 1.1rem; opacity: 0.8; }
    
    .sound-btn {
      display: block;
      width: 200px;
      height: 200px;
      margin: 0 auto 30px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
      font-size: 5rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 40px rgba(255,107,107,0.4);
      animation: pulse 2s infinite;
    }
    .sound-btn:hover { transform: scale(1.05); }
    .sound-btn:active { transform: scale(0.95); }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 10px 40px rgba(255,107,107,0.4); }
      50% { box-shadow: 0 10px 60px rgba(255,107,107,0.6); }
    }
    
    .question {
      text-align: center;
      font-size: 1.5rem;
      color: #2d3436;
      margin-bottom: 30px;
    }
    
    .animals-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .animal-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .animal-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .animal-emoji { font-size: 3rem; margin-bottom: 10px; }
    .animal-name { font-size: 1.1rem; font-weight: 600; color: #2d3436; }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: white;
      padding: 15px 30px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .stat-label { font-size: 0.9rem; color: #636e72; }
    .stat-value { font-size: 1.8rem; font-weight: 600; color: #2d3436; }
    
    .controls {
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 15px 40px;
      background: white;
      color: #e84393;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 5px;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    
    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 6rem;
      animation: feedbackPop 0.5s ease;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes feedbackPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    
    @media (max-width: 600px) {
      .animals-grid { grid-template-columns: repeat(2, 1fr); }
      .sound-btn { width: 150px; height: 150px; font-size: 4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🦁 Animal Sounds</h1>
      <p>听声音，猜动物！</p>
    </div>
    
    <button class="sound-btn" onclick="playSound()">🔊</button>
    
    <div class="question">这是什么动物？<br>What animal is this?</div>
    
    <div class="animals-grid" id="animalsGrid"></div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">得分 Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">连对 Streak</div>
        <div class="stat-value" id="streak">0</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="btn" onclick="nextQuestion()">🔄 下一题</button>
      <a href="index.html" class="btn">🏠 返回首页</a>
    </div>
  </div>

  <script>
    const animals = [
      { emoji: '🐱', name: 'cat', sound: 'Meow', cn: '猫' },
      { emoji: '🐶', name: 'dog', sound: 'Woof', cn: '狗' },
      { emoji: '🐮', name: 'cow', sound: 'Moo', cn: '牛' },
      { emoji: '🐷', name: 'pig', sound: 'Oink', cn: '猪' },
      { emoji: '🐔', name: 'chicken', sound: 'Cluck', cn: '鸡' },
      { emoji: '🐑', name: 'sheep', sound: 'Baa', cn: '羊' },
      { emoji: '🦆', name: 'duck', sound: 'Quack', cn: '鸭子' },
      { emoji: '🐴', name: 'horse', sound: 'Neigh', cn: '马' }
    ];
    
    let score = 0;
    let streak = 0;
    let currentAnimal = null;

    function initGame() {
      const grid = document.getElementById('animalsGrid');
      grid.innerHTML = '';
      
      animals.forEach(animal => {
        const card = document.createElement('div');
        card.className = 'animal-card';
        card.innerHTML = `
          <div class="animal-emoji">${animal.emoji}</div>
          <div class="animal-name">${animal.cn}</div>
        `;
        card.onclick = () => checkAnswer(animal);
        grid.appendChild(card);
      });
      
      nextQuestion();
    }

    function nextQuestion() {
      currentAnimal = animals[Math.floor(Math.random() * animals.length)];
    }

    function playSound() {
      if (!currentAnimal) return;
      
      // Visual feedback
      const btn = document.querySelector('.sound-btn');
      btn.style.transform = 'scale(0.9)';
      setTimeout(() => btn.style.transform = 'scale(1)', 100);
      
      // Speak the sound
      speak(`${currentAnimal.sound}! ${currentAnimal.sound}!`);
    }

    function checkAnswer(selectedAnimal) {
      if (!currentAnimal) return;
      
      const isCorrect = selectedAnimal.name === currentAnimal.name;
      
      // Show feedback
      const feedback = document.createElement('div');
      feedback.className = 'feedback';
      feedback.textContent = isCorrect ? '✅' : '❌';
      document.body.appendChild(feedback);
      setTimeout(() => feedback.remove(), 500);
      
      if (isCorrect) {
        score += 10 + streak;
        streak++;
        speak(`Yes! It's a ${currentAnimal.name}!`);
        setTimeout(nextQuestion, 1000);
      } else {
        streak = 0;
        score = Math.max(0, score - 5);
        speak(`No, it's a ${currentAnimal.name}. Try again!`);
      }
      
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
      }
    }

    // Start game
    initGame();
  </script>
</body>
</html>
