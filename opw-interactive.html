<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPW 互动练习 | Oxford Phonics World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Quiz Section */
        .quiz-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }
        .quiz-title {
            font-size: 1.8em;
            color: #2c3e50;
        }
        .quiz-stats {
            display: flex;
            gap: 20px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .quiz-level-select {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .level-btn {
            padding: 12px 30px;
            border: none;
            background: #f0f0f0;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        .level-btn:hover {
            background: #e0e0e0;
        }
        .level-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }
        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .option-btn {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            color: #333;
            transition: all 0.3s;
            text-align: center;
        }
        .option-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }
        .option-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .option-btn.correct {
            border-color: #4CAF50;
            background: #4CAF50;
            color: white;
        }
        .option-btn.wrong {
            border-color: #f44336;
            background: #f44336;
            color: white;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .feedback.show {
            display: block;
        }
        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4CAF50;
        }
        .feedback.wrong {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .quiz-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 15px;
        }
        .control-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }
        .control-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .control-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .control-btn.secondary {
            background: #f0f0f0;
            color: #666;
        }
        .control-btn.secondary:hover {
            background: #e0e0e0;
        }

        /* Word Building */
        .word-build-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        .word-build-title {
            font-size: 1.8em;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #4ECDC4;
        }
        .word-prompt {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #555;
            text-align: center;
        }
        .word-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .letter-slot {
            width: 60px;
            height: 60px;
            border: 3px dashed #667eea;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            background: #f0f4ff;
        }
        .letter-slot.filled {
            border-style: solid;
            background: #667eea;
            color: white;
        }
        .letter-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .letter-btn {
            width: 50px;
            height: 50px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }
        .letter-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }
        .letter-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Blending Game */
        .blending-game {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        .blending-title {
            font-size: 1.8em;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #FF6B6B;
        }
        .blending-area {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #FFF9E6 0%, #FFE6CC 100%);
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .blend-sounds {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
            font-size: 2.5em;
        }
        .blend-sound {
            padding: 15px 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .blend-sound:hover {
            transform: scale(1.1);
        }
        .blend-plus {
            color: #999;
            font-size: 2em;
        }
        .blend-result {
            font-size: 3em;
            font-weight: bold;
            color: #FF6B6B;
            margin-top: 20px;
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            .quiz-level-select {
                flex-direction: column;
            }
            .blend-sounds {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 OPW 互动练习</h1>
            <p>Oxford Phonics World 在线练习与游戏</p>
        </div>

        <!-- Quiz Section -->
        <div class="quiz-container">
            <div class="quiz-header">
                <div class="quiz-title">📝 拼读测验</div>
                <div class="quiz-stats">
                    <div class="stat-box">
                        <div class="stat-label">得分</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">题目</div>
                        <div class="stat-value" id="currentQ">1/10</div>
                    </div>
                </div>
            </div>

            <div class="quiz-level-select">
                <button class="level-btn active" onclick="selectLevel(1)">Level 1 - 字母音值</button>
                <button class="level-btn" onclick="selectLevel(2)">Level 2 - 辅音组合</button>
                <button class="level-btn" onclick="selectLevel(3)">Level 3 - 短元音家族</button>
                <button class="level-btn" onclick="selectLevel(4)">Level 4 - 长元音规则</button>
                <button class="level-btn" onclick="selectLevel(5)">Level 5 - 高级规则</button>
            </div>

            <div class="question-card">
                <div class="question-text" id="questionText">请选择字母 A 的正确发音：</div>
                <div class="options-grid" id="optionsGrid"></div>
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="quiz-controls">
                <button class="control-btn secondary" onclick="resetQuiz()">🔄 重新开始</button>
                <button class="control-btn primary" onclick="nextQuestion()">下一题 →</button>
            </div>
        </div>

        <!-- Word Building -->
        <div class="word-build-section">
            <div class="word-build-title">🔤 单词构建</div>
            <div class="word-prompt">请用下面的字母拼出单词：<strong id="targetWord">cat</strong></div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="letter-bank" id="letterBank"></div>
            <div class="quiz-controls">
                <button class="control-btn secondary" onclick="resetWordBuild()">🔄 换词</button>
                <button class="control-btn primary" onclick="checkWord()">✅ 检查答案</button>
            </div>
        </div>

        <!-- Blending Game -->
        <div class="blending-game">
            <div class="blending-title">🔊 拼读练习</div>
            <div class="blending-area">
                <p style="font-size: 1.2em; color: #555; margin-bottom: 20px;">点击音素听发音，然后尝试拼出完整单词</p>
                <div class="blend-sounds">
                    <div class="blend-sound" onclick="playBlendSound(0)" id="blend1">c</div>
                    <div class="blend-plus">+</div>
                    <div class="blend-sound" onclick="playBlendSound(1)" id="blend2">a</div>
                    <div class="blend-plus">+</div>
                    <div class="blend-sound" onclick="playBlendSound(2)" id="blend3">t</div>
                    <div class="blend-plus">=</div>
                    <div class="blend-result" id="blendResult">?</div>
                </div>
                <button class="control-btn primary" style="margin-top: 20px;" onclick="revealBlend()">显示答案</button>
                <button class="control-btn secondary" onclick="nextBlend()">下一个单词</button>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="opw-overview.html" class="back-btn">🏠 返回概览</a>
        </div>
    </div>

    <script>
        // Quiz Data
        const quizData = {
            1: [
                { q: "字母 A 的正确发音是？", options: ["/æ/", "/e/", "/i/", "/o/"], correct: 0 },
                { q: "哪个单词以字母 B 开头？", options: ["apple", "ball", "cat", "dog"], correct: 1 },
                { q: "字母 C 的发音是？", options: ["/s/", "/k/", "/t/", "/d/"], correct: 1 },
                { q: "哪个单词包含字母 E？", options: ["bat", "dog", "egg", "fish"], correct: 2 },
                { q: "字母 F 的发音是？", options: ["/v/", "/f/", "/b/", "/p/"], correct: 1 },
                { q: "哪个单词以字母 G 开头？", options: ["hat", "girl", "jet", "kite"], correct: 1 },
                { q: "字母 H 的发音是？", options: ["/h/", "/j/", "/k/", "/l/"], correct: 0 },
                { q: "哪个单词包含字母 I？", options: ["dog", "pig", "ink", "jam"], correct: 2 },
                { q: "字母 J 的发音是？", options: ["/dʒ/", "/tʃ/", "/j/", "/k/"], correct: 0 },
                { q: "哪个单词以字母 K 开头？", options: ["lion", "kite", "moon", "nest"], correct: 1 }
            ],
            2: [
                { q: "辅音组合 bl 的发音是？", options: ["/bl/", "/pl/", "/cl/", "/fl/"], correct: 0 },
                { q: "哪个单词包含辅音组合 cr？", options: ["blue", "brown", "clock", "flag"], correct: 1 },
                { q: "辅音组合 fl 的发音是？", options: ["/fl/", "/fr/", "/pl/", "/bl/"], correct: 0 },
                { q: "哪个单词包含辅音组合 gr？", options: ["green", "blue", "train", "tree"], correct: 0 },
                { q: "辅音组合 pl 的发音是？", options: ["/pl/", "/bl/", "/cl/", "/fl/"], correct: 0 },
                { q: "哪个单词包含辅音组合 sk？", options: ["slow", "star", "skirt", "swim"], correct: 2 },
                { q: "辅音组合 sp 的发音是？", options: ["/st/", "/sp/", "/sk/", "/sm/"], correct: 1 },
                { q: "哪个单词包含辅音组合 tr？", options: ["dress", "train", "draw", "truck"], correct: 1 },
                { q: "辅音组合 sn 的发音是？", options: ["/st/", "/sn/", "/sk/", "/sp/"], correct: 1 },
                { q: "哪个单词包含辅音组合 sw？", options: ["slow", "star", "smile", "sleep"], correct: 0 }
            ],
            3: [
                { q: "短元音 a /æ/ 的单词是？", options: ["pet", "cat", "sit", "hot"], correct: 1 },
                { q: "哪个词族包含 cat？", options: ["-et", "-at", "-it", "-ot"], correct: 1 },
                { q: "短元音 e /e/ 的单词是？", options: ["cat", "bed", "pig", "dog"], correct: 1 },
                { q: "哪个词族包含 pen？", options: ["-an", "-en", "-in", "-un"], correct: 1 },
                { q: "短元音 i /ɪ/ 的单词是？", options: ["pan", "pen", "pin", "pot"], correct: 2 },
                { q: "哪个词族包含 pig？", options: ["-ag", "-eg", "-ig", "-og"], correct: 2 },
                { q: "短元音 o /ɒ/ 的单词是？", options: ["cat", "bed", "pig", "hot"], correct: 3 },
                { q: "哪个词族包含 dog？", options: ["-ap", "-ep", "-ip", "-og"], correct: 3 },
                { q: "短元音 u /ʌ/ 的单词是？", options: ["cut", "cat", "cot", "kit"], correct: 0 },
                { q: "哪个词族包含 bug？", options: ["-at", "-et", "-ut", "-ot"], correct: 2 }
            ],
            4: [
                { q: "魔法 e 使元音发？", options: ["短音", "长音", "双元音", "不发音"], correct: 1 },
                { q: "单词 cake 的元音发音是？", options: ["/æ/", "/eɪ/", "/i/", "/o/"], correct: 1 },
                { q: "单词 bike 的元音发音是？", options: ["/ɪ/", "/aɪ/", "/eɪ/", "/oʊ/"], correct: 1 },
                { q: "单词 home 的元音发音是？", options: ["/ɒ/", "/oʊ/", "/u/", "/i/"], correct: 1 },
                { q: "单词 cute 的元音发音是？", options: ["/ʌ/", "/u/", "/ju:/", "/ɪ/"], correct: 2 },
                { q: "元音组合 ai 发？", options: ["/æ/", "/eɪ/", "/aɪ/", "/ɔɪ/"], correct: 1 },
                { q: "单词 rain 的元音发音是？", options: ["/eɪ/", "/aɪ/", "/oʊ/", "/i/"], correct: 0 },
                { q: "元音组合 ea 在 'tea' 中发？", options: ["/e/", "/i:/", "/eɪ/", "/aɪ/"], correct: 1 },
                { q: "单词 boat 的元音发音是？", options: ["/oʊ/", "/aʊ/", "/ɔɪ/", "/i:/"], correct: 0 },
                { q: "元音组合 oo 在 'moon' 中发？", options: ["/u/", "/u:/", "/ʌ/", "/ə/"], correct: 1 }
            ],
            5: [
                { q: "双元音 ai 在 'rain' 中发？", options: ["/æ/", "/eɪ/", "/aɪ/", "/ɔɪ/"], correct: 1 },
                { q: "单词 play 的元音发音是？", options: ["/eɪ/", "/aɪ/", "/oʊ/", "/i/"], correct: 0 },
                { q: "双元音 ow 在 'cow' 中发？", options: ["/oʊ/", "/aʊ/", "/ɔɪ/", "/i/"], correct: 1 },
                { q: "R控元音 ar 在 'car' 中发？", options: ["/æ/", "/ɑː/", "/ɔː/", "/ə/"], correct: 1 },
                { q: "R控元音 or 在 'for' 中发？", options: ["/ɒ/", "/ɔː/", "/ə/", "/i:/"], correct: 1 },
                { q: "单词 star 的元音发音是？", options: ["/æ/", "/ɑː/", "/ɔː/", "/i/"], correct: 1 },
                { q: "双元音 oi 在 'coin' 中发？", options: ["/oɪ/", "/ɔɪ/", "/aɪ/", "/eɪ/"], correct: 0 },
                { q: "单词 boy 的元音发音是？", options: ["/ɔɪ/", "/oɪ/", "/aɪ/", "/eɪ/"], correct: 0 },
                { q: "多音节词 table 有几个音节？", options: ["1", "2", "3", "4"], correct: 1 },
                { q: "单词 banana 有几个音节？", options: ["2", "3", "4", "5"], correct: 1 }
            ]
        };

        const wordBuildWords = ['cat', 'dog', 'pig', 'hat', 'bed', 'sit', 'hot', 'cut', 'map', 'pen'];
        const blendWords = [
            { sounds: ['c', 'a', 't'], word: 'cat' },
            { sounds: ['d', 'o', 'g'], word: 'dog' },
            { sounds: ['p', 'i', 'g'], word: 'pig' },
            { sounds: ['b', 'a', 't'], word: 'bat' },
            { sounds: ['h', 'a', 't'], word: 'hat' }
        ];

        let currentLevel = 1;
        let currentQuestion = 0;
        let score = 0;
        let selectedOption = null;
        let currentBuildWord = '';
        let currentBlendIndex = 0;

        // Initialize Quiz
        function initQuiz() {
            loadQuestion();
        }

        function selectLevel(level) {
            currentLevel = level;
            currentQuestion = 0;
            score = 0;
            selectedOption = null;
            
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateScore();
            loadQuestion();
        }

        function loadQuestion() {
            const questions = quizData[currentLevel];
            const q = questions[currentQuestion];
            
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('currentQ').textContent = `${currentQuestion + 1}/${questions.length}`;
            
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = q.options.map((opt, index) => `
                <button class="option-btn" onclick="selectOption(${index})">${opt}</button>
            `).join('');
            
            document.getElementById('feedback').classList.remove('show');
            selectedOption = null;
        }

        function selectOption(index) {
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            selectedOption = index;
        }

        function nextQuestion() {
            if (selectedOption === null) {
                alert('请先选择一个答案！');
                return;
            }
            
            const questions = quizData[currentLevel];
            const q = questions[currentQuestion];
            
            const feedback = document.getElementById('feedback');
            feedback.classList.add('show');
            
            const options = document.querySelectorAll('.option-btn');
            if (selectedOption === q.correct) {
                score++;
                feedback.className = 'feedback show correct';
                feedback.textContent = '✅ 正确！太棒了！';
                options[selectedOption].classList.add('correct');
            } else {
                feedback.className = 'feedback show wrong';
                feedback.textContent = `❌ 错误！正确答案是：${q.options[q.correct]}`;
                options[selectedOption].classList.add('wrong');
                options[q.correct].classList.add('correct');
            }
            
            updateScore();
            
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion >= questions.length) {
                    alert(`🎉 测验完成！\n得分：${score}/${questions.length}`);
                    resetQuiz();
                } else {
                    loadQuestion();
                }
            }, 1500);
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function resetQuiz() {
            currentQuestion = 0;
            score = 0;
            selectedOption = null;
            updateScore();
            loadQuestion();
        }

        // Word Building
        function initWordBuild() {
            nextWordBuild();
        }

        function nextWordBuild() {
            currentBuildWord = wordBuildWords[Math.floor(Math.random() * wordBuildWords.length)];
            document.getElementById('targetWord').textContent = currentBuildWord;
            
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            for (let i = 0; i < currentBuildWord.length; i++) {
                display.innerHTML += `<div class="letter-slot" id="slot${i}">?</div>`;
            }
            
            const bank = document.getElementById('letterBank');
            const letters = currentBuildWord.split('').sort(() => Math.random() - 0.5);
            bank.innerHTML = letters.map((letter, index) => `
                <button class="letter-btn" onclick="placeLetter('${letter}', ${index})">${letter}</button>
            `).join('');
        }

        function placeLetter(letter, btnIndex) {
            const display = document.getElementById('wordDisplay');
            const slots = display.querySelectorAll('.letter-slot');
            
            for (let i = 0; i < slots.length; i++) {
                if (slots[i].textContent === '?') {
                    slots[i].textContent = letter;
                    slots[i].classList.add('filled');
                    slots[i].dataset.letter = letter;
                    document.querySelectorAll('.letter-btn')[btnIndex].classList.add('used');
                    break;
                }
            }
        }

        function checkWord() {
            const display = document.getElementById('wordDisplay');
            const slots = display.querySelectorAll('.letter-slot');
            let builtWord = '';
            slots.forEach(slot => {
                builtWord += slot.textContent === '?' ? '' : slot.textContent;
            });
            
            if (builtWord === currentBuildWord) {
                alert('✅ 正确！你拼对了！');
            } else {
                alert(`❌ 错误！正确答案是：${currentBuildWord}`);
            }
        }

        function resetWordBuild() {
            nextWordBuild();
        }

        // Blending Game
        function initBlending() {
            loadBlend();
        }

        function loadBlend() {
            const blend = blendWords[currentBlendIndex];
            document.getElementById('blend1').textContent = blend.sounds[0];
            document.getElementById('blend2').textContent = blend.sounds[1];
            document.getElementById('blend3').textContent = blend.sounds[2];
            document.getElementById('blendResult').textContent = '?';
        }

        function playBlendSound(index) {
            const blend = blendWords[currentBlendIndex];
            const sound = blend.sounds[index];
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(sound);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            }
        }

        function revealBlend() {
            const blend = blendWords[currentBlendIndex];
            document.getElementById('blendResult').textContent = blend.word;
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(blend.word);
                utterance.lang = 'en-US';
                utterance.rate = 0.7;
                speechSynthesis.speak(utterance);
            }
        }

        function nextBlend() {
            currentBlendIndex = (currentBlendIndex + 1) % blendWords.length;
            loadBlend();
        }

        // Initialize all
        initQuiz();
        initWordBuild();
        initBlending();
    </script>
</body>
</html>
