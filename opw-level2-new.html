*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#FF6B6B;--red-d:#e04444;
  --orange:#FF9A3C;--yellow:#FFD93D;
  --green:#4CAF50;--blue:#4D96FF;
  --purple:#9B59B6;--pink:#FF6B9D;
  --teal:#26C6DA;--bg:#F0F8FF;
  --white:#fff;--dark:#1a1a2e;
  --shadow:0 4px 20px rgba(0,0,0,.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#333;min-height:100vh;}
.topbar{background:linear-gradient(135deg,#4D96FF,#9B59B6);color:white;}
.rainbow-bar{height:6px;background:linear-gradient(90deg,#FF6B6B,#FF9A3C,#FFD93D,#6BCB77,#4D96FF,#9B59B6);}
.topbar-inner{display:flex;align-items:center;gap:14px;padding:12px 20px;}
.back-btn{background:rgba(255,255,255,.22);border:none;color:white;padding:6px 18px;border-radius:20px;font-weight:900;cursor:pointer;font-size:.9rem;text-decoration:none;transition:.2s;}
.back-btn:hover{background:rgba(255,255,255,.38);}
.topbar-title{font-family:'Fredoka One',cursive;font-size:1.4rem;}
.topbar-sub{font-size:.8rem;opacity:.8;margin-left:auto;}
.hero{background:linear-gradient(135deg,#4D96FF,#9B59B6);color:white;text-align:center;padding:36px 20px 54px;position:relative;overflow:hidden;}
.hero::before{content:'🔊';position:absolute;left:-18px;bottom:-18px;font-size:9rem;opacity:.1;pointer-events:none;}
.hero::after{content:'📖';position:absolute;right:-14px;top:-10px;font-size:9rem;opacity:.1;pointer-events:none;}
.hero-badge{display:inline-block;background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.5);padding:5px 20px;border-radius:30px;font-size:.85rem;font-weight:900;letter-spacing:1px;margin-bottom:10px;}
.hero-title{font-family:'Fredoka One',cursive;font-size:2.8rem;margin-bottom:4px;text-shadow:2px 2px 8px rgba(0,0,0,.15);}
.hero-sub{font-size:1rem;opacity:.9;margin-bottom:20px;}
.hero-stats{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;}
.hs{background:rgba(255,255,255,.18);border-radius:16px;padding:10px 20px;min-width:86px;}
.hs-num{font-family:'Fredoka One',cursive;font-size:1.6rem;}
.hs-label{font-size:.72rem;opacity:.85;}
.tab-nav{display:flex;overflow-x:auto;background:white;border-bottom:2px solid #f0f0f0;position:sticky;top:0;z-index:99;padding:0 12px;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.tab-nav::-webkit-scrollbar{height:3px;}
.tab-nav::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}
.tab-btn{padding:13px 16px;font-weight:900;font-size:.88rem;color:#bbb;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;font-family:'Nunito',sans-serif;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-btn:hover:not(.active){color:var(--blue);opacity:.7;}
.pane{display:none;padding:24px 16px;max-width:1000px;margin:0 auto;}
.pane.active{display:block;}
.sec-hdr{text-align:center;margin-bottom:28px;}
.sec-hdr h2{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--dark);margin-bottom:5px;}
.sec-hdr p{color:#888;font-size:.92rem;}
.units-timeline{display:flex;flex-direction:column;gap:0;}
.unit-group{margin-bottom:32px;}
.group-label{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.group-line{flex:1;height:2px;background:linear-gradient(90deg,var(--blue),transparent);}
.group-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--blue);white-space:nowrap;}
.unit-card{background:white;border-radius:22px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;transition:transform .2s;}
.unit-card:hover{transform:translateY(-3px);}
.unit-card.review-card .uc-head{background:linear-gradient(135deg,#FFD93D,#FF9A3C)!important;}
.unit-card.review-card{border:2.5px solid #FFD93D;}
.unit-card.final-review .uc-head{background:linear-gradient(135deg,#9B59B6,#FF6B9D)!important;}
.unit-card.final-review{border:3px solid #9B59B6;box-shadow:0 4px 30px rgba(155,89,182,.3);}
.uc-head{padding:16px 20px;color:white;position:relative;display:flex;align-items:center;gap:14px;}
.uc-head-emoji{font-size:2.2rem;flex-shrink:0;}
.uc-head-info{flex:1;}
.uc-unit-num{font-size:.75rem;font-weight:900;opacity:.85;letter-spacing:1px;}
.uc-title{font-family:'Fredoka One',cursive;font-size:1.3rem;}
.uc-subtitle{font-size:.82rem;opacity:.85;margin-top:2px;}
.uc-toggle{background:rgba(255,255,255,.25);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;transition:.2s;flex-shrink:0;}
.uc-toggle:hover{background:rgba(255,255,255,.4);}
.uc-body{display:none;padding:20px;}
.uc-body.open{display:block;}
.phonics-box{background:linear-gradient(135deg,#f0f8ff,#e8f4fd);border-radius:16px;padding:16px 20px;margin-bottom:18px;border-left:4px solid var(--blue);}
.phonics-box h4{font-family:'Fredoka One',cursive;color:var(--blue);font-size:1rem;margin-bottom:8px;}
.phonics-box p{font-size:.88rem;line-height:1.7;color:#444;}
.phonics-ipa{font-size:1.1rem;color:var(--purple);font-weight:900;cursor:pointer;}
.phonics-ipa:hover{text-decoration:underline;}
.wf-box{background:#fff9f0;border-radius:16px;padding:16px;margin-bottom:18px;text-align:center;}
.wf-box h4{font-family:'Fredoka One',cursive;color:var(--orange);margin-bottom:10px;}
.wf-pattern{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--blue);letter-spacing:2px;margin-bottom:8px;}
.wf-words-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.wf-word-chip{background:white;border:2px solid var(--blue);border-radius:12px;padding:6px 14px;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--dark);cursor:pointer;transition:.2s;}
.wf-word-chip:hover{background:var(--blue);color:white;transform:scale(1.08);}
.word-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px;}
.wcard{background:white;border-radius:16px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:.2s;cursor:pointer;border:2px solid transparent;}
.wcard:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,.13);}
.wcard.learned{border-color:var(--green);background:#f0fff4;}
.wcard-emoji{font-size:2.2rem;margin-bottom:6px;}
.wcard-word{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--dark);margin-bottom:2px;}
.wcard-word .vowel{color:var(--orange);font-size:1.3rem;}
.wcard-ipa{font-size:.75rem;color:#888;}
.wcard-speak{background:var(--blue);color:white;border:none;border-radius:50%;width:28px;height:28px;font-size:.9rem;cursor:pointer;margin-top:6px;transition:.2s;}
.wcard-speak:hover{transform:scale(1.15);background:var(--purple);}
.sentence-box{background:linear-gradient(135deg,#f0f8ff,#fff8f0);border-radius:16px;padding:16px;margin-bottom:18px;border-left:4px solid var(--teal);}
.sentence-box h4{font-family:'Fredoka One',cursive;color:var(--teal);font-size:.95rem;margin-bottom:10px;}
.sentence-text{font-size:1.15rem;color:#333;line-height:1.8;font-weight:700;}
.sentence-text .highlight{color:var(--red);background:linear-gradient(transparent 60%,#ffeb3b 60%);padding:0 2px;}
.sentence-play{background:var(--teal);color:white;border:none;padding:8px 16px;border-radius:20px;font-size:.85rem;cursor:pointer;margin-top:10px;transition:.2s;}
.sentence-play:hover{background:var(--green);}
.song-box{background:linear-gradient(135deg,#fff0f8,#f0fff8);border-radius:16px;padding:16px;margin-bottom:18px;}
.song-box h4{font-family:'Fredoka One',cursive;color:var(--pink);font-size:.95rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.song-lyrics{font-size:.9rem;line-height:1.9;color:#555;white-space:pre-line;}
.song-lyrics .phonics{color:var(--red);font-weight:900;}
.checkin-box{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-radius:16px;padding:16px;margin-bottom:18px;text-align:center;}
.checkin-box h4{font-family:'Fredoka One',cursive;color:var(--green);margin-bottom:12px;}
.checkin-btn{background:linear-gradient(135deg,var(--green),#6BCB77);color:white;border:none;padding:12px 32px;border-radius:25px;font-size:1rem;font-weight:900;cursor:pointer;transition:.2s;box-shadow:0 4px 15px rgba(76,175,80,.3);}
.checkin-btn:hover{transform:scale(1.05);}
.checkin-btn.done{background:#ccc;cursor:default;}
.checkin-stats{margin-top:12px;font-size:.85rem;color:#666;}
.review-content{background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:16px;padding:16px;margin-bottom:18px;}
.review-content h4{font-family:'Fredoka One',cursive;color:var(--orange);margin-bottom:12px;}
.review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.review-item{background:white;border-radius:12px;padding:10px;text-align:center;border:2px solid #ffc107;cursor:pointer;transition:.2s;}
.review-item:hover{border-color:var(--orange);background:#fff8f0;transform:scale(1.05);}
.final-review-content{background:linear-gradient(135deg,#f3e5f5,#fce4ec);border-radius:16px;padding:20px;margin-bottom:18px;}
.final-review-content h4{font-family:'Fredoka One',cursive;color:var(--purple);margin-bottom:15px;font-size:1.1rem;}
.level-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-bottom:20px;}
.level-card{background:white;border-radius:16px;padding:15px;box-shadow:0 2px 12px rgba(0,0,0,.08);text-align:center;}
.level-card h5{font-family:'Fredoka One',cursive;color:var(--blue);margin-bottom:8px;font-size:.95rem;}
.level-card p{font-size:.8rem;color:#666;line-height:1.5;}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-top:12px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow),var(--green),var(--blue),var(--purple));border-radius:4px;transition:width .5s;}
.footer{text-align:center;padding:30px 20px;background:#f5f5f5;margin-top:40px;}
.footer-text{font-size:.85rem;color:#888;}
.footer-stars{font-size:1.5rem;margin-bottom:8px;}
@media(max-width:600px){
  .hero-title{font-size:2rem;}
  .hs{min-width:70px;padding:8px 14px;}
  .hs-num{font-size:1.3rem;}
  .word-cards{grid-template-columns:repeat(2,1fr);}
}
</style>

// Build UNITS with reviews (every 3 lessons)
const UNITS = [];
let reviewCount = 1;
for (let i = 0; i < LESSONS.length; i++) {
  UNITS.push(LESSONS[i]);
  // Add review after every 3 units (except after the last one)
  if ((i + 1) % 3 === 0 && i < LESSONS.length - 1) {
    UNITS.push({
      id: `R${reviewCount}`,
      type: 'review',
      group: `复习 ${reviewCount}`,
      emoji: '🔄',
      title: `复习 Units ${i-1}-${i+1}`,
      subtitle: `Review Word Families`,
      reviewUnits: [i-1, i, i+1].map(n => LESSONS[n].id)
    });
    reviewCount++;
  }
}
// Add final review
UNITS.push({
  id: 'FINAL',
  type: 'final-review',
  group: '🏆 总复习',
  emoji: '🏆',
  title: 'Level 2 总复习',
  subtitle: '恭喜完成 Level 2！'
});

let progress = JSON.parse(localStorage.getItem('opw-level2-progress') || '{}');

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'progress') renderProgress();
    if (btn.dataset.tab === 'rules') renderRules();
  });
});

function getUnitColor(unit) {
  if (unit.type === 'final-review') return 'linear-gradient(135deg,#9B59B6,#FF6B9D)';
  if (unit.type === 'review') return 'linear-gradient(135deg,#FFD93D,#FF9A3C)';
  const colors = [
    'linear-gradient(135deg,#FF6B6B,#FF9A3C)',
    'linear-gradient(135deg,#4D96FF,#9B59B6)',
    'linear-gradient(135deg,#4CAF50,#26C6DA)',
    'linear-gradient(135deg,#9B59B6,#FF6B9D)'
  ];
  return colors[(unit.id - 1) % colors.length];
}

function renderUnits() {
  const container = document.getElementById('units-container');
  let currentGroup = '';
  let html = '';
  
  UNITS.forEach((unit, idx) => {
    if (unit.group !== currentGroup) {
      currentGroup = unit.group;
      html += `<div class="unit-group">
        <div class="group-label">
          <span class="group-title">${currentGroup}</span>
          <div class="group-line"></div>
        </div>`;
    }
    
    const isLearned = progress[unit.id]?.learned;
    const cardClass = unit.type === 'review' ? 'review-card' : (unit.type === 'final-review' ? 'final-review' : '');
    
    html += `
      <div class="unit-card ${cardClass}" data-id="${unit.id}">
        <div class="uc-head" style="background:${getUnitColor(unit)}">
          <div class="uc-head-emoji">${unit.emoji}</div>
          <div class="uc-head-info">
            <div class="uc-unit-num">${unit.type === 'final-review' ? '🏆 FINAL' : (unit.type === 'review' ? `复习 ${unit.id.toString().replace('R','')}` : `Unit ${unit.id}`)}</div>
            <div class="uc-title">${unit.title}</div>
            <div class="uc-subtitle">${unit.subtitle}</div>
          </div>
          <button class="uc-toggle" onclick="toggleUnit('${unit.id}')">${isLearned ? '✓' : '▼'}</button>
        </div>
        <div class="uc-body" id="body-${unit.id}">
          ${renderUnitContent(unit)}
        </div>
      </div>`;
    
    if (idx === UNITS.length - 1 || UNITS[idx + 1].group !== currentGroup) {
      html += `</div>`;
    }
  });
  
  container.innerHTML html;
}

function renderUnitContent(unit) {
  if (unit.type === 'review') return renderReviewContent(unit);
  if (unit.type === 'final-review') return renderFinalReviewContent(unit);
  
  let html = '';
  
  // Phonics rule
  const vowelSounds = { a: '/æ/', e: '/e/', i: '/ɪ/', o: '/ɒ/', u: '/ʌ/' };
  html += `
    <div class="phonics-box">
      <h4>📖 拼读规则</h4>
      <p>短元音 <strong>${unit.vowel.toUpperCase()}</strong> 发音 <span class="phonics-ipa" onclick="speak('${vowelSounds[unit.vowel]}', 'en')">${vowelSounds[unit.vowel]}</span></p>
      <p style="margin-top:8px;">词族 <strong>-${unit.family}</strong>：替换首字母拼读新单词</p>
    </div>`;
  
  // Word family display
  html += `
    <div class="wf-box">
      <h4>🔤 词族 -${unit.family}</h4>
      <div class="wf-pattern">-<span style="color:var(--orange)">${unit.family}</span></div>
      <div class="wf-words-row">
        ${unit.words.map(w => `<span class="wf-word-chip" onclick="speak('${w.word}', 'en')">${w.word.replace(unit.family, '')}<span style="color:var(--orange)">${unit.family}</span></span>`).join('')}
      </div>
    </div>`;
  
  // Word cards
  html += `
    <h4 style="font-family:'Fredoka One',cursive;color:var(--dark);margin:16px 0 12px;">📝 核心词汇</h4>
    <div class="word-cards">
      ${unit.words.map(w => `
        <div class="wcard ${progress[unit.id]?.words?.includes(w.word) ? 'learned' : ''}" onclick="toggleWord('${unit.id}', '${w.word}')">
          <div class="wcard-emoji">${w.emoji}</div>
          <div class="wcard-word">${highlightVowel(w.word, unit.vowel)}</div>
          <div class="wcard-ipa">${w.ipa}</div>
          <button class="wcard-speak" onclick="event.stopPropagation();speak('${w.word}', 'en')">🔊</button>
        </div>
      `).join('')}
    </div>`;
  
  // Sentence
  html += `
    <div class="sentence-box">
      <h4>💬 核心句子</h4>
      <div class="sentence-text">${highlightSentence(unit.sentence, unit.family)}</div>
      <button class="sentence-play" onclick="speak('${unit.sentence.replace(/'/g, "\\'")}', 'en')">🔊 朗读句子</button>
    </div>`;
  
  // Song
  html += `
    <div class="song-box">
      <h4>🎵 歌谣</h4>
      <div class="song-lyrics">${unit.song}</div>
      <button class="sentence-play" onclick="speak(\`${unit.song.replace(/'/g, "\\'")}\`, 'en')">🎵 朗读歌谣</button>
    </div>`;
  
  // Check-in
  html += `
    <div class="checkin-box">
      <h4>✅ 打卡完成</h4>
      <button class="checkin-btn ${progress[unit.id]?.learned ? 'done' : ''}" onclick="checkin('${unit.id}')">
        ${progress[unit.id]?.learned ? '✓ 已完成' : '完成学习'}
      </button>
      <div class="checkin-stats">${getCheckinStats(unit.id)}</div>
    </div>`;
  
  return html;
}

function highlightVowel(word, vowel) {
  const regex = new RegExp(vowel, 'gi');
  return word.replace(regex, `<span class="vowel">${vowel}</span>`);
}

function highlightSentence(sentence, family) {
  const regex = new RegExp(`\\b\\w*${family}\\w*\\b`, 'gi');
  return sentence.replace(regex, match => `<span class="highlight">${match}</span>`);
}

function renderReviewContent(unit) {
  const reviewLessons = unit.reviewUnits.map(id => LESSONS.find(l => l.id === id)).filter(Boolean);
  const allWords = reviewLessons.flatMap(l => l.words.slice(0, 3));
  
  return `
    <div class="review-content">
      <h4>🔄 复习词族</h4>
      <p style="margin-bottom:15px;color:#666;">巩固 ${reviewLessons.map(l => `-${l.family}`).join(' / ')} 词族</p>
      <div class="review-grid">
        ${allWords.map(w => `
          <div class="review-item" onclick="speak('${w.word}', 'en')">
            <div style="font-size:1.5rem">${w.emoji}</div>
            <div style="font-family:'Fredoka One',cursive;margin-top:4px">${w.word}</div>
          </div>
        `).join('')}
      </div>
      <div class="checkin-box" style="margin-top:20px;background:transparent;border:none;">
        <button class="checkin-btn ${progress[unit.id]?.learned ? 'done' : ''}" onclick="checkin('${unit.id}')">
          ${progress[unit.id]?.learned ? '✓ 已完成' : '完成复习'}
        </button>
      </div>
    </div>`;
}

function toggleUnit(id) {
  const body = document.getElementById(`body-${id}`);
  body.classList.toggle('open');
}

function toggleWord(unitId, word) {
  if (!progress[unitId]) progress[unitId] = { words: [] };
  if (!progress[unitId].words) progress[unitId].words = [];
  const idx = progress[unitId].words.indexOf(word);
  if (idx === -1) progress[unitId].words.push(word);
  else progress[unitId].words.splice(idx, 1);
  saveProgress();
  renderUnits();
}

function checkin(id) {
  if (!progress[id]) progress[id] = {};
  progress[id].learned = true;
  progress[id].timestamp = Date.now();
  saveProgress();
  renderUnits();
}

function getCheckinStats(unitId) {
  const p = progress[unitId];
  if (!p || !p.learned) return '';
  return `完成于 ${new Date(p.timestamp).toLocaleDateString('zh-CN')}`;
}

function saveProgress() {
  localStorage.setItem('opw-level2-progress', JSON.stringify(progress));
}

function renderProgress() {
  const total = UNITS.length;
  const learned = Object.values(progress).filter(p => p.learned).length;
  const percent = Math.round(learned / total * 100);
  let totalWords = 0, learnedWords = 0;
  UNITS.forEach(u => {
    if (u.words) {
      totalWords += u.words.length;
      if (progress[u.id]?.words) learnedWords += progress[u.id].words.length;
    }
  });
  
  document.getElementById('progress-content').innerHTML = `
    <div style="text-align:center;padding:30px;background:white;border-radius:20px;box-shadow:var(--shadow);margin-bottom:20px;">
      <div style="font-family:'Fredoka One',cursive;font-size:2.5rem;color:var(--blue);">${learned}/${total}</div>
      <div style="color:#888;margin:8px 0;">单元完成</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
      <div style="margin-top:10px;font-size:.9rem;color:#666;">完成度 ${percent}%</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;">
      <div style="background:white;border-radius:16px;padding:20px;text-align:center;box-shadow:var(--shadow);">
        <div style="font-size:2rem">📚</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--blue);margin:8px 0;">${learned}</div>
        <div style="color:#888;font-size:.85rem;">单元完成</div>
      </div>
      <div style="background:white;border-radius:16px;padding:20px;text-align:center;box-shadow:var(--shadow);">
        <div style="font-size:2rem">📝</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--green);margin:8px 0;">${learnedWords}/${totalWords}</div>
        <div style="color:#888;font-size:.85rem;">词汇学习</div>
      </div>
    </div>
    ${percent === 100 ? '<div style="text-align:center;padding:30px;background:linear-gradient(135deg,#9B59B6,#FF6B9D);border-radius:20px;margin-top:20px;color:white;"><div style="font-size:3rem;margin-bottom:10px;">🎉🏆🎉</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.5rem;">Congratulations!</div></div>' : ''}
  `;
}

function speak(text, lang) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang === 'en' ? 'en-US' : 'zh-CN';
  utterance.rate = 0.85;
  speechSynthesis.speak(utterance);
}
