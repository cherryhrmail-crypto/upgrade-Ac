<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animals 动物王国 | 小星星英语</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#56ab2f,#a8e063 40%,#87CEEB 70%,#4facfe 100%);min-height:100vh;overflow-x:hidden;}

.back-btn{position:fixed;left:18px;top:18px;z-index:200;background:rgba(255,255,255,.9);border:none;border-radius:30px;padding:9px 20px;font-family:'Nunito',sans-serif;font-weight:900;color:#56ab2f;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.15);text-decoration:none;transition:transform .2s;}
.back-btn:hover{transform:scale(1.07);}

header{text-align:center;padding:70px 20px 16px;position:relative;z-index:10;}
.page-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,8vw,3.8rem);color:white;text-shadow:0 3px 14px rgba(0,0,0,.25);}
.page-sub{color:rgba(255,255,255,.85);font-size:1rem;margin-top:4px;}

.mode-tabs{display:flex;justify-content:center;gap:12px;margin:14px auto 20px;flex-wrap:wrap;position:relative;z-index:10;padding:0 16px;}
.tab-btn{background:rgba(255,255,255,.3);border:2.5px solid rgba(255,255,255,.6);color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;padding:9px 22px;border-radius:30px;cursor:pointer;transition:all .22s;}
.tab-btn.active,.tab-btn:hover{background:white;color:#56ab2f;transform:scale(1.06);}

.score-bar{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin:0 auto 14px;position:relative;z-index:10;}
.score-pill{background:rgba(255,255,255,.3);border-radius:20px;padding:7px 18px;font-weight:900;font-size:.95rem;color:white;}

.section{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:0 16px 80px;}
#section-learn{display:block;}
#section-sound{display:none;}
#section-match{display:none;}

/* Animal Cards */
.animal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;}
.animal-card{background:white;border-radius:24px;padding:20px 12px 16px;text-align:center;cursor:pointer;transition:transform .25s,box-shadow .25s;box-shadow:0 5px 18px rgba(0,0,0,.12);border:3px solid transparent;user-select:none;}
.animal-card:hover,.animal-card.lit{transform:translateY(-10px) scale(1.06);box-shadow:0 16px 36px rgba(86,171,47,.3);}
.animal-emoji{font-size:3.8rem;display:block;transition:transform .3s;}
.animal-card:hover .animal-emoji{transform:rotate(-8deg) scale(1.15);}
.animal-en{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#333;margin:6px 0 2px;}
.animal-cn{font-size:.82rem;color:#aaa;}
.animal-sound{font-size:.78rem;font-style:italic;color:#56ab2f;margin-top:4px;}

/* Sound quiz */
.sound-arena{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:28px;padding:30px;border:2px solid rgba(255,255,255,.3);text-align:center;}
.sound-q{font-family:'Fredoka One',cursive;font-size:1.5rem;color:white;margin-bottom:20px;}
.sound-emoji-big{font-size:7rem;animation:bounce 1.5s ease-in-out infinite;cursor:pointer;display:inline-block;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.sound-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:400px;margin:24px auto 0;}
.sopt{background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.35);border-radius:20px;padding:14px 10px;font-family:'Fredoka One',cursive;font-size:1.2rem;color:white;cursor:pointer;transition:all .22s;}
.sopt:hover{background:rgba(255,255,255,.3);transform:scale(1.06);}
.sopt.correct{background:#2ECC71;border-color:#2ECC71;}
.sopt.wrong{background:#E74C3C;border-color:#E74C3C;}

/* Match game */
.match-wrap{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:28px;padding:24px;border:2px solid rgba(255,255,255,.25);}
.match-title{color:white;font-family:'Fredoka One',cursive;font-size:1.4rem;text-align:center;margin-bottom:20px;}
.match-row{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
.match-col{flex:1;min-width:140px;}
.match-col-title{color:rgba(255,255,255,.7);font-size:.85rem;font-weight:700;text-align:center;margin-bottom:10px;}
.match-item{background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.3);border-radius:18px;padding:12px 10px;margin-bottom:10px;text-align:center;cursor:pointer;transition:all .22s;color:white;}
.match-item:hover{background:rgba(255,255,255,.3);}
.match-item.selected{background:rgba(255,215,0,.35);border-color:#FFD700;}
.match-item.matched{background:rgba(46,204,113,.3);border-color:#2ECC71;cursor:default;opacity:.7;}
.match-item.wrong-flash{background:rgba(231,76,60,.35);border-color:#E74C3C;animation:shk .4s ease;}
.match-emoji{font-size:2.2rem;}
.match-word{font-family:'Fredoka One',cursive;font-size:1.1rem;}
.match-score-row{text-align:center;margin-top:16px;color:white;font-weight:700;}
.match-new-btn{margin-top:12px;background:white;border:none;border-radius:24px;padding:10px 28px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:#56ab2f;cursor:pointer;transition:transform .2s;}
.match-new-btn:hover{transform:scale(1.07);}

@keyframes shk{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:white;border-radius:20px;padding:14px 28px;font-weight:900;font-size:1.1rem;color:#333;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:9999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.good{border-left:6px solid #2ECC71;}
.toast.bad{border-left:6px solid #E74C3C;}

@media(max-width:480px){.animal-grid{grid-template-columns:repeat(3,1fr);gap:10px;}.animal-emoji{font-size:2.5rem;}}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← 返回</a>

<header>
  <div class="page-title">🦒 Animals 动物王国</div>
  <div class="page-sub">认识动物朋友，学动物叫声！</div>
</header>

<div class="score-bar">
  <div class="score-pill">⭐ 积分: <span id="scoreNum">0</span></div>
  <div class="score-pill" id="starPill">☆☆☆☆☆</div>
</div>

<div class="mode-tabs">
  <button class="tab-btn active" onclick="switchMode('learn')">🐾 认识动物</button>
  <button class="tab-btn" onclick="switchMode('sound')">🔊 听声辨动物</button>
  <button class="tab-btn" onclick="switchMode('match')">🎴 配对游戏</button>
</div>

<!-- LEARN -->
<div class="section" id="section-learn">
  <div class="animal-grid" id="animalGrid"></div>
</div>

<!-- SOUND QUIZ -->
<div class="section" id="section-sound">
  <div class="sound-arena">
    <div class="sound-q" id="soundQ">这是什么动物？What animal is this?</div>
    <div class="sound-emoji-big" id="soundEmoji" onclick="playAnimalSound()">🐶</div>
    <p style="color:rgba(255,255,255,.6);font-size:.85rem;margin-top:8px;">点击动物听声音 Click to hear!</p>
    <div class="sound-opts" id="soundOpts"></div>
  </div>
</div>

<!-- MATCH -->
<div class="section" id="section-match">
  <div class="match-wrap">
    <div class="match-title">🎴 配对游戏 Matching Game!</div>
    <div class="match-row">
      <div class="match-col">
        <div class="match-col-title">图片 Picture</div>
        <div id="matchEmojis"></div>
      </div>
      <div class="match-col">
        <div class="match-col-title">单词 Word</div>
        <div id="matchWords"></div>
      </div>
    </div>
    <div class="match-score-row">已配对: <span id="matchedCount">0</span> / <span id="matchTotal">6</span></div>
    <div style="text-align:center"><button class="match-new-btn" onclick="setupMatch()">🔄 新一轮 New Game</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ANIMALS = [
  {en:'Cat',     cn:'猫',   e:'🐱', sound:'Meow meow!',    color:'#FF8C42'},
  {en:'Dog',     cn:'狗',   e:'🐶', sound:'Woof woof!',    color:'#FF6B9D'},
  {en:'Rabbit',  cn:'兔子', e:'🐰', sound:'Squeak squeak!',color:'#a18cd1'},
  {en:'Elephant',cn:'大象', e:'🐘', sound:'Roarrr!',       color:'#9B59B6'},
  {en:'Lion',    cn:'狮子', e:'🦁', sound:'Roar roar!',    color:'#E67E22'},
  {en:'Monkey',  cn:'猴子', e:'🐒', sound:'Ooh ooh ah ah!',color:'#8B4513'},
  {en:'Bird',    cn:'小鸟', e:'🐦', sound:'Tweet tweet!',  color:'#3498DB'},
  {en:'Duck',    cn:'鸭子', e:'🦆', sound:'Quack quack!',  color:'#2EC4B6'},
  {en:'Cow',     cn:'牛',   e:'🐮', sound:'Moo moo!',      color:'#27AE60'},
  {en:'Frog',    cn:'青蛙', e:'🐸', sound:'Ribbit ribbit!',color:'#2ECC71'},
  {en:'Bear',    cn:'熊',   e:'🐻', sound:'Grrr!',         color:'#795548'},
  {en:'Tiger',   cn:'老虎', e:'🐯', sound:'Roar!',         color:'#FF5722'},
];

let score=0, soundItem=null;
let matchSelected=null, matchPairs=[], matchedCount=0;

function speak(t,r=0.72,p=1.3){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';u.rate=r;u.pitch=p;window.speechSynthesis.speak(u);
}
function addScore(n){
  score+=n;document.getElementById('scoreNum').textContent=score;
  const s=Math.min(5,Math.floor(score/10));
  document.getElementById('starPill').textContent='★'.repeat(s)+'☆'.repeat(5-s);
}
function showToast(msg,good){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast '+(good?'good':'bad')+' show';setTimeout(()=>t.classList.remove('show'),1800);
}

function switchMode(m){
  ['learn','sound','match'].forEach(id=>{
    document.getElementById('section-'+id).style.display=m===id?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['learn','sound','match'][i]===m);
  });
  if(m==='sound')setupSound();
  if(m==='match')setupMatch();
}

// ---- LEARN ----
function buildGrid(){
  const g=document.getElementById('animalGrid');
  ANIMALS.forEach(item=>{
    const c=document.createElement('div');
    c.className='animal-card';
    c.style.borderColor=item.color+'55';
    c.innerHTML=`<span class="animal-emoji">${item.e}</span><div class="animal-en" style="color:${item.color}">${item.en}</div><div class="animal-cn">${item.cn}</div><div class="animal-sound">"${item.sound}"</div>`;
    c.onclick=()=>{
      document.querySelectorAll('.animal-card').forEach(x=>x.classList.remove('lit'));
      c.classList.add('lit');
      speak(`${item.en}. ${item.sound}`,0.7,1.35);
    };
    g.appendChild(c);
  });
}

// ---- SOUND QUIZ ----
function setupSound(){
  soundItem=ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
  document.getElementById('soundEmoji').textContent=soundItem.e;
  speak(`${soundItem.en}. ${soundItem.sound}`,0.7,1.35);

  const opts=new Set([ANIMALS.indexOf(soundItem)]);
  while(opts.size<4)opts.add(Math.floor(Math.random()*ANIMALS.length));
  const div=document.getElementById('soundOpts');div.innerHTML='';
  [...opts].sort(()=>Math.random()-.5).forEach(i=>{
    const item=ANIMALS[i];
    const btn=document.createElement('button');
    btn.className='sopt';
    btn.innerHTML=`${item.e} ${item.en}`;
    btn.onclick=()=>checkSound(i,btn);
    div.appendChild(btn);
  });
}
function playAnimalSound(){speak(`${soundItem.en}. ${soundItem.sound}`,0.7,1.35);}
function checkSound(i,btn){
  document.querySelectorAll('.sopt').forEach(b=>b.onclick=null);
  if(ANIMALS[i]===soundItem){
    btn.classList.add('correct');speak(`Yes! ${soundItem.en}!`,0.7,1.4);addScore(6);
    showToast(`🎉 ${soundItem.en}! 正确！`,true);
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.sopt').forEach(b=>{if(b.textContent.includes(soundItem.en))b.classList.add('correct');});
    speak(`Oops! It is a ${soundItem.en}!`,0.7,1.3);
    showToast(`💡 答案: ${soundItem.en} ${soundItem.e}`,false);
  }
  setTimeout(setupSound,2200);
}

// ---- MATCH ----
function setupMatch(){
  matchSelected=null;matchedCount=0;
  document.getElementById('matchedCount').textContent=0;
  const pool=[...ANIMALS].sort(()=>Math.random()-.5).slice(0,6);
  matchPairs=pool;document.getElementById('matchTotal').textContent=pool.length;
  const emojisDiv=document.getElementById('matchEmojis');
  const wordsDiv=document.getElementById('matchWords');
  const shuffledWords=[...pool].sort(()=>Math.random()-.5);

  emojisDiv.innerHTML='';
  pool.forEach(item=>{
    const d=document.createElement('div');d.className='match-item';
    d.dataset.id=ANIMALS.indexOf(item);d.dataset.type='emoji';
    d.innerHTML=`<span class="match-emoji">${item.e}</span>`;
    d.onclick=()=>matchClick(d);emojisDiv.appendChild(d);
  });
  wordsDiv.innerHTML='';
  shuffledWords.forEach(item=>{
    const d=document.createElement('div');d.className='match-item';
    d.dataset.id=ANIMALS.indexOf(item);d.dataset.type='word';
    d.innerHTML=`<div class="match-word">${item.en}</div><div style="font-size:.75rem;color:rgba(255,255,255,.6)">${item.cn}</div>`;
    d.onclick=()=>matchClick(d);wordsDiv.appendChild(d);
  });
}
function matchClick(el){
  if(el.classList.contains('matched'))return;
  if(!matchSelected){
    document.querySelectorAll('.match-item').forEach(x=>x.classList.remove('selected'));
    el.classList.add('selected');matchSelected=el;
    speak(ANIMALS[parseInt(el.dataset.id)].en,0.7,1.3);
    return;
  }
  if(matchSelected===el){matchSelected=null;el.classList.remove('selected');return;}
  const a=matchSelected,b=el;
  if(a.dataset.id===b.dataset.id&&a.dataset.type!==b.dataset.type){
    // correct
    a.classList.remove('selected');a.classList.add('matched');
    b.classList.add('matched');a.onclick=null;b.onclick=null;
    speak(`${ANIMALS[parseInt(a.dataset.id)].en}! Match!`,0.7,1.4);
    matchedCount++;document.getElementById('matchedCount').textContent=matchedCount;
    addScore(8);
    if(matchedCount===matchPairs.length){
      setTimeout(()=>{showToast('🏆 全部配对完成！Amazing!',true);speak('Amazing! You matched all animals!',0.7,1.3);},300);
    }
  }else{
    // wrong
    a.classList.add('wrong-flash');b.classList.add('wrong-flash');
    setTimeout(()=>{a.classList.remove('wrong-flash','selected');b.classList.remove('wrong-flash');},600);
  }
  matchSelected=null;
}

buildGrid();
window.onload=()=>setTimeout(()=>speak('Animals! Let\'s learn about animals!',0.7,1.3),700);
</script>
</body>
</html>
